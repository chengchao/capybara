name: Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run check:electron
      - run: bun x tsc -p tsconfig.json --noEmit

  supervisor-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun run test:supervisor:image
      - run: bun run test:supervisor
